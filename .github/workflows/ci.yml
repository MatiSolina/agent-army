name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this job only reads the repo. Dependabot bumps the pinned
# SHAs below (full-commit-SHA pins prevent a moved tag from running new code).
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test
      - run: pnpm exec tsc --noEmit
      - run: pnpm lint

      # note: `pnpm build` is omitted — it needs Supabase/Vercel env that
      # isn't available to PRs from forks. Add a build job with secrets if you
      # want CI to catch build-time breaks too.
